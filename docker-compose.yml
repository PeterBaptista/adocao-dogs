services:
  db:
    image: postgres:17
    container_name: adocao-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adocao
    ports:
      - "5432:5432"
    volumes:
      - adocao_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adocao"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  adocao_pgdata:
